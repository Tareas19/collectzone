<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Articulo - CollectZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-gem me-2"></i>CollectZone</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: rgba(255,255,255,0.3);">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="articulos.html">Articulos</a></li>
                    <li class="nav-item"><a class="nav-link" href="ranking.html">Ranking</a></li>
                    <li class="nav-item" id="publicarBtn" style="display:none;"><a class="nav-link" href="crear-articulo.html">Publicar</a></li>
                    <li class="nav-item" id="misArticulosBtn" style="display:none;"><a class="nav-link" href="mis-articulos.html">Mis Articulos</a></li>
                    <li class="nav-item" id="favoritosBtn" style="display:none;"><a class="nav-link" href="favoritos.html"><i class="fas fa-heart me-1"></i></a></li>
                    <li class="nav-item" id="carritoBtn" style="display:none;">
                        <a class="nav-link" href="carrito.html" style="position:relative;">
                            <i class="fas fa-shopping-cart me-1"></i>
                            <span id="carritoCount" class="badge rounded-pill" style="background:var(--accent); color:white; font-size:0.6rem; position:absolute; top:0; right:-8px; display:none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="intercambiosBtn" style="display:none;"><a class="nav-link" href="intercambios.html"><i class="fas fa-exchange-alt me-1"></i></a></li>
                    <li class="nav-item" id="adminBtn" style="display:none;"><a class="nav-link" href="admin.html"><i class="fas fa-shield-halved me-1"></i>Admin</a></li>
                    <li class="nav-item" id="loginBtn"><a class="nav-link" href="login.html">Iniciar Sesion</a></li>
                    <li class="nav-item" id="registerBtn"><a class="nav-link" href="registro.html">Registrarse</a></li>
                    <li class="nav-item" id="userInfo" style="display:none;">
                        <span class="nav-link" style="color: var(--accent);"><i class="fas fa-user-circle me-1"></i><span id="userName"></span></span>
                    </li>
                    <li class="nav-item" id="logoutBtn" style="display:none;">
                        <a class="nav-link" href="#" onclick="cerrarSesion()" style="color: rgba(255,255,255,0.6);"><i class="fas fa-sign-out-alt me-1"></i>Salir</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <!-- BREADCRUMB -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html" style="color:var(--accent); text-decoration:none;">Inicio</a></li>
                <li class="breadcrumb-item"><a href="articulos.html" style="color:var(--accent); text-decoration:none;">Articulos</a></li>
                <li class="breadcrumb-item active" id="bcNombre">...</li>
            </ol>
        </nav>

        <div id="detalleContainer" class="fade-in"></div>

        <!-- RELACIONADOS -->
        <section class="mt-5">
            <h3 class="section-title mb-4"><i class="fas fa-layer-group me-2" style="color:var(--accent);"></i>Articulos similares</h3>
            <div class="row" id="relacionadosContainer"></div>
        </section>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <p class="mb-0"><i class="fas fa-gem me-2"></i>CollectZone 2025 - Proyecto DAW</p>
                <div class="d-flex gap-3">
                    <a href="index.html" class="small">Inicio</a>
                    <a href="articulos.html" class="small">Articulos</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get("id");

        document.addEventListener("DOMContentLoaded", async () => {
            if (!id) { window.location.href = "articulos.html"; return; }
            try {
                const art = await ArticuloAPI.obtenerPorId(id);
                if (!art) throw new Error();
                renderDetalle(art);
                cargarRelacionados(art);
            } catch(e) {
                document.getElementById("detalleContainer").innerHTML = '<div class="alert alert-warning text-center">Articulo no encontrado</div>';
            }
        });

        function renderDetalle(a) {
            document.getElementById("bcNombre").textContent = a.nombre;
            const usuario = getUsuarioActual();
            const esPropietario = usuario && a.usuario && usuario.id === a.usuario.id;
            const esAdmin = usuario && usuario.rol === "ADMIN";
            const fecha = a.fechaPublicacion ? new Date(a.fechaPublicacion).toLocaleDateString('es-ES') : '-';

            const estadoBadge = {
                "DISPONIBLE": '<span class="badge bg-success"><i class="fas fa-check-circle me-1"></i>Disponible</span>',
                "INTERCAMBIO": '<span class="badge bg-primary"><i class="fas fa-exchange-alt me-1"></i>Intercambio</span>',
                "VENDIDO": '<span class="badge bg-danger"><i class="fas fa-tag me-1"></i>Vendido</span>'
            }[a.estado] || '';

            let acciones = '';
            if (usuario && !esPropietario && a.estado === "DISPONIBLE") {
                acciones += `<button onclick="agregarAlCarrito(${a.id})" class="btn-accent w-100 mb-2"><i class="fas fa-cart-plus me-2"></i>Anadir al carrito</button>`;
                acciones += `<button onclick="toggleFavorito(${a.id}, this)" class="btn btn-outline-danger w-100 mb-2" data-favorito-btn="${a.id}"><i class="far fa-heart me-2"></i>Agregar a favoritos</button>`;
            }
            if (usuario && !esPropietario && a.estado === "INTERCAMBIO") {
                acciones += `<button onclick="proponerIntercambio(${a.id})" class="btn-blue w-100 mb-2"><i class="fas fa-exchange-alt me-2"></i>Proponer intercambio</button>`;
                acciones += `<button onclick="toggleFavorito(${a.id}, this)" class="btn btn-outline-danger w-100 mb-2" data-favorito-btn="${a.id}"><i class="far fa-heart me-2"></i>Agregar a favoritos</button>`;
            }
            if (esPropietario || esAdmin) {
                acciones += `<a href="editar-articulo.html?id=${a.id}" class="btn-outline-spider w-100 mb-2 text-decoration-none d-block text-center"><i class="fas fa-pen me-2"></i>Editar</a>`;
            }
            if (!usuario) {
                acciones = '<div class="alert alert-info"><i class="fas fa-info-circle me-1"></i><a href="login.html">Inicia sesion</a> para comprar o intercambiar</div>';
            }

            document.getElementById("detalleContainer").innerHTML = `
                <div class="row g-4">
                    <div class="col-lg-6">
                        <div style="background:var(--white); border-radius:16px; padding:20px; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                            <img src="${a.imagenUrl || 'https://via.placeholder.com/600x400?text=Sin+imagen'}" class="img-fluid" style="border-radius:12px; width:100%;" alt="${a.nombre}">
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div style="background:var(--white); border-radius:16px; padding:30px; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
                            <div class="d-flex gap-2 mb-3">
                                <span class="badge-categoria">${a.categoria}</span>
                                ${estadoBadge}
                            </div>
                            <h1 class="fw-bold mb-3" style="color:var(--primary);">${a.nombre}</h1>
                            <div class="mb-4"><span style="color:var(--accent); font-size:2.5rem; font-weight:900;">${a.precio} EUR</span></div>
                            <hr>
                            <h5 class="fw-bold"><i class="fas fa-align-left me-2" style="color:var(--accent);"></i>Descripcion</h5>
                            <p class="text-muted">${a.descripcion}</p>
                            <hr>
                            <h6 class="fw-bold"><i class="fas fa-user me-2" style="color:var(--accent);"></i>Vendedor</h6>
                            <div class="d-flex align-items-center gap-2 mb-3">
                                <div style="width:45px; height:45px; border-radius:50%; background:var(--secondary); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold;">${(a.usuario?.nombre||'?').charAt(0).toUpperCase()}</div>
                                <div>
                                    <strong>${a.usuario?.nombre || 'Desconocido'}</strong><br>
                                    <small class="text-muted"><i class="fas fa-calendar me-1"></i>Publicado: ${fecha}</small>
                                </div>
                            </div>
                            <hr>
                            ${acciones}
                        </div>
                    </div>
                </div>`;

            setTimeout(() => cargarEstadoFavoritos(), 200);
        }

        async function cargarRelacionados(articulo) {
            const todos = await ArticuloAPI.obtenerTodos();
            const rel = todos.filter(a => a.categoria === articulo.categoria && a.id !== articulo.id).slice(0, 4);
            const cont = document.getElementById("relacionadosContainer");
            if (rel.length === 0) {
                cont.innerHTML = '<div class="col-12 text-center text-muted">No hay articulos similares.</div>';
                return;
            }
            cont.innerHTML = rel.map(a => `
                <div class="col-md-6 col-lg-3 mb-3">
                    <div class="card-custom h-100">
                        <img src="${a.imagenUrl || 'https://via.placeholder.com/300x200'}" class="card-img-top" alt="${a.nombre}">
                        <div class="card-body d-flex flex-column">
                            <span class="badge-categoria mb-2">${a.categoria}</span>
                            <h6 class="card-title">${a.nombre}</h6>
                            <p class="precio mb-3">${a.precio} EUR</p>
                            <a href="detalle-articulo.html?id=${a.id}" class="btn-accent mt-auto">Ver</a>
                        </div>
                    </div>
                </div>`).join("");
        }
    </script>
</body>
</html>
