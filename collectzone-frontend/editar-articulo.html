        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item"><a class="nav-link" href="articulos.html">Articulos</a></li>
                <li class="nav-item"><a class="nav-link" href="ranking.html">Ranking</a></li>
                <li class="nav-item" id="publicarBtn" style="display:none;"><a class="nav-link" href="crear-articulo.html">Publicar</a></li>
                <li class="nav-item" id="misArticulosBtn" style="display:none;"><a class="nav-link" href="mis-articulos.html">Mis Articulos</a></li>
                <li class="nav-item" id="favoritosBtn" style="display:none;"><a class="nav-link" href="favoritos.html"><i class="fas fa-heart me-1"></i></a></li>

    <div class="container mt-4">
        <div class="form-container fade-in">
            <h2><i class="fas fa-edit me-2" style="color: var(--gold);"></i>Editar Articulo</h2>

            <form onsubmit="actualizarArticulo(event)">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre del articulo</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>
                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripcion</label>
                    <textarea class="form-control" id="descripcion" rows="3"></textarea>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="precio" class="form-label">Precio (EUR)</label>
                        <input type="number" step="0.01" class="form-control" id="precio" required>
                    </div>
                    <div class="col-md-6">
                        <label for="categoria" class="form-label">Categoria</label>
                        <select class="form-select" id="categoria" required>
                            <option value="CARTAS">Cartas</option>
                            <option value="MONEDAS">Monedas</option>
                            <option value="FIGURAS">Figuras</option>
                            <option value="SELLOS">Sellos</option>
                            <option value="OTROS">Otros</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="estado" class="form-label">Estado</label>
                        <select class="form-select" id="estado">
                            <option value="DISPONIBLE">Disponible</option>
                            <option value="VENDIDO">Vendido</option>
                            <option value="INTERCAMBIO">Intercambio</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="imagenUrl" class="form-label">URL de imagen</label>
                        <input type="url" class="form-control" id="imagenUrl">
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn-gold flex-grow-1">
                        <i class="fas fa-save me-2"></i>Guardar cambios
                    </button>
                    <a href="articulos.html" class="btn btn-outline-secondary px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", cargarArticuloParaEditar);
    </script>
</body>
</html>
