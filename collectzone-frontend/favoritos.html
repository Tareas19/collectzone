

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos - CollectZone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-gem me-2"></i>CollectZone</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border-color: rgba(255,255,255,0.3);">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="articulos.html">Articulos</a></li>
                    <li class="nav-item"><a class="nav-link" href="ranking.html">Ranking</a></li>
                    <li class="nav-item" id="publicarBtn" style="display:none;"><a class="nav-link" href="crear-articulo.html">Publicar</a></li>
                    <li class="nav-item" id="misArticulosBtn" style="display:none;"><a class="nav-link" href="mis-articulos.html">Mis Articulos</a></li>
                    <li class="nav-item" id="favoritosBtn" style="display:none;"><a class="nav-link active" href="favoritos.html"><i class="fas fa-heart me-1"></i></a></li>
                    <li class="nav-item" id="carritoBtn" style="display:none;">
                        <a class="nav-link" href="carrito.html" style="position:relative;">
                            <i class="fas fa-shopping-cart me-1"></i>
                            <span id="carritoCount" class="badge rounded-pill" style="background:var(--accent); color:white; font-size:0.6rem; position:absolute; top:0; right:-8px; display:none;">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="intercambiosBtn" style="display:none;"><a class="nav-link" href="intercambios.html"><i class="fas fa-exchange-alt me-1"></i></a></li>
                    <li class="nav-item" id="adminBtn" style="display:none;"><a class="nav-link" href="admin.html"><i class="fas fa-shield-halved me-1"></i>Admin</a></li>
                    <li class="nav-item" id="loginBtn"><a class="nav-link" href="login.html">Iniciar Sesion</a></li>
                    <li class="nav-item" id="registerBtn"><a class="nav-link" href="registro.html">Registrarse</a></li>
                    <li class="nav-item" id="userInfo" style="display:none;">
                        <span class="nav-link" style="color: var(--accent);"><i class="fas fa-user-circle me-1"></i><span id="userName"></span></span>
                    </li>
                    <li class="nav-item" id="logoutBtn" style="display:none;">
                        <a class="nav-link" href="#" onclick="cerrarSesion()" style="color: rgba(255,255,255,0.6);"><i class="fas fa-sign-out-alt me-1"></i>Salir</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section style="background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 50px 0; position:relative; overflow:hidden;">
        <div style="position:absolute; inset:0; background-image: var(--web-pattern); background-size: 60px 60px; opacity:0.3;"></div>
        <div class="container position-relative">
            <div class="hero-line"></div>
            <h1 style="color:white; font-weight:900;"><i class="fas fa-heart me-2" style="color:var(--accent);"></i>Mis <span style="color:var(--accent);">Favoritos</span></h1>
            <p style="color:rgba(255,255,255,0.7); margin:0;">Los articulos que te han enamorado</p>
        </div>
    </section>

    <!-- LISTA (usa articulosContainer para que cargarMisFavoritos lo reconozca) -->
    <div class="container my-4">
        <div class="row" id="articulosContainer"></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <p class="mb-0"><i class="fas fa-gem me-2"></i>CollectZone 2025 - Proyecto DAW</p>
                <div class="d-flex gap-3">
                    <a href="index.html" class="small">Inicio</a>
                    <a href="articulos.html" class="small">Articulos</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const usuario = getUsuarioActual();
            if (!usuario) {
                window.location.href = "login.html";
                return;
            }
            // Funcion unificada de app.js: renderiza tarjetas con
            // - imagenes reales por categoria
            // - botones Comprar + Intercambiar siempre juntos
            // - corazon relleno (ya son favoritos)
            cargarMisFavoritos();
        });
    </script>
</body>
</html>
